name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm compile

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Check extension manifest
        run: |
          node <<'NODE'
          const manifest = require('./.output/chrome-mv3/manifest.json');
          const permissions = manifest.permissions ?? [];
          const expected = ['bookmarks'];

          if (JSON.stringify(permissions) !== JSON.stringify(expected)) {
            throw new Error(`Unexpected permissions: ${JSON.stringify(permissions)}`);
          }

          if (manifest.content_scripts) {
            throw new Error('content_scripts must not be declared');
          }

          console.log(`Manifest version: ${manifest.version}`);
          console.log('Manifest permissions OK');
          NODE

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release

